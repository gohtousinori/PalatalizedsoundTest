<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>日本語音声聴覚識別調査 / การทดสอบการแยกแยะเสียงภาษาญี่ปุ่น</title>
  <script src="https://unpkg.com/jspsych@7.3.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.2"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.2"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-multi-choice@1.1.0"></script>
  <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
  <link href="https://unpkg.com/jspsych@7.3.3/css/jspsych.css" rel="stylesheet" />
  <style>
    body { background: #000; color: #fff; }
    .jspsych-display-element, .jspsych-content-wrapper { background: #000; color: #fff; }
    .jspsych-btn { background: #222; color: #fff; border: 1px solid #555; }
    input[type="text"], input[type="email"], textarea { background: #111; color: #fff; border: 1px solid #444; }
  </style>
</head>
<body></body>
<script>
  // ========================================
  // Mapping: stimulus (kana) -> audio filename (romaji, no extension)
  // ========================================
  const stimulusToRomaji = {
    'し':'shi', 'ち':'chi', 'ひ':'hi', 'に':'ni', 'ぎ':'gi', 'じ':'ji', 'き':'ki', 'り':'ri', 'み':'mi', 'び':'bi', 'ぴ':'pi',
    'きゃ':'kya', 'きゅ':'kyu', 'きょ':'kyo',
    'ぎゃ':'gya', 'ぎゅ':'gyu', 'ぎょ':'gyo',
    'しゃ':'sha', 'しゅ':'shu', 'しょ':'sho',
    'じゃ':'ja', 'じゅ':'ju', 'じょ':'jo',
    'ちゃ':'cha', 'ちゅ':'chu', 'ちょ':'cho',
    'にゃ':'nya', 'にゅ':'nyu', 'にょ':'nyo',
    'ひゃ':'hya', 'ひゅ':'hyu', 'ひょ':'hyo',
    'ぴゃ':'pya', 'ぴゅ':'pyu', 'ぴょ':'pyo',
    'びゃ':'bya', 'びゅ':'byu', 'びょ':'byo',
    'みゃ':'mya', 'みゅ':'myu', 'みょ':'myo',
    'りゃ':'rya', 'りゅ':'ryu', 'りょ':'ryo',
    'か':'ka', 'た':'ta'
  };

  // ========================================
  // ขั้นตอนที่ 1: เริ่มต้น jsPsych และตั้งค่าการส่งผลการทดลองไปยัง Google Sheets
  // ========================================
  const jsPsych = initJsPsych({
    on_finish: function() {
      const allData = jsPsych.data.get().values();
      const responseRows = allData.filter(r => r.task === 'response');
      
      // ===================== ลำดับเสียง 44 ข้อ (ตามที่ user ระบุ) =====================
      const stimulusOrder = [
        'し','ち','ひ','に','ぎ','じ','き','り','み','び','ぴ',
        'きゃ','きゅ','きょ','ぎゃ','ぎゅ','ぎょ',
        'しゃ','しゅ','しょ','じゃ','じゅ','じょ',
        'ちゃ','ちゅ','ちょ','にゃ','にゅ','にょ',
        'ひゃ','ひゅ','ひょ','ぴゃ','ぴゅ','ぴょ',
        'びゃ','びゅ','びょ','みゃ','みゅ','みょ',
        'りゃ','りゅ','りょ'
      ];
      
      const tanOnList = ['し','ち','ひ','に','ぎ','じ','き','り','み','び','ぴ'];
      
      // ===================== ดึงข้อมูลพื้นฐาน =====================
      const preFormData = allData.find(r => r.task === 'pre_survey_form') || {};
      const studyYear = preFormData.study_year || '';
      const studyMonth = preFormData.study_month || '';
      const stayYear = preFormData.stay_year || '';
      const stayMonth = preFormData.stay_month || '';
      const email = preFormData.email || '';
      
      const preChoiceData = allData.find(r => r.task === 'pre_survey_choice') || {};
      let pronExperience = '';
      if (preChoiceData.response) {
        let resp = preChoiceData.response;
        if (typeof resp === 'string') {
          try { resp = JSON.parse(resp); } catch(e) {}
        }
        if (Array.isArray(resp)) {
          pronExperience = resp[0] || '';
        } else if (resp && typeof resp === 'object') {
          pronExperience = Object.values(resp)[0] || '';
        } else {
          pronExperience = resp;
        }
      }
      
      const preInstData = allData.find(r => r.task === 'pre_survey_institution') || {};
      let institution = '';
      if (preInstData.response) {
        let resp = preInstData.response;
        if (typeof resp === 'string') {
          try { resp = JSON.parse(resp); } catch(e) {}
        }
        if (resp && typeof resp === 'object') {
          institution = resp.institution || '';
        } else {
          institution = resp || '';
        }
      }

      // ===================== สร้าง map สำหรับ stimulus -> trial data =====================
      const trialMap = {};
      responseRows.forEach(d => {
        trialMap[d.stimulus] = d;
      });

      // ===================== สร้าง result row (1 row ต่อ 1 participant) =====================
      const resultRow = {
        'Email': email,
        'ระยะเวลาการเรียนภาษาญี่ปุ่นรวม (ปี)': studyYear,
        'ระยะเวลาการเรียนภาษาญี่ปุ่นรวม (เดือน)': studyMonth,
        'ระยะเวลาการพำนักที่ญี่ปุ่นรวม (ปี)': stayYear,
        'ระยะเวลาการพำนักที่ญี่ปุ่นรวม (เดือน)': stayMonth,
        'ประสบการณ์การเรียนการออกเสียง': pronExperience,
        'สถาบัน': institution,
      };

      let totalTanOn = 0;
      let totalYoOn = 0;
      let totalRT = 0;
      let countRT = 0;

      // ===================== สร้างคอลัมน์ Result และ RT สำหรับแต่ละ stimulus =====================
      stimulusOrder.forEach(stim => {
        const trial = trialMap[stim];
        if (!trial) {
          resultRow[`Result_${stim}`] = '';
          resultRow[`RT_${stim}`] = '';
          return;
        }

        const correct = trial.correct === true || trial.correct === 'true';
        const chosenChoice = trial.chosen_choice || '';
        const rt = trial.rt || 0;

        let resultStr;
        if (correct) {
          resultStr = 'T';
          if (tanOnList.includes(stim)) totalTanOn++;
          else totalYoOn++;
        } else {
          // ถ้าตอบผิด ให้ดึง "other_sound" จาก other_text trial ที่ใกล้เคียง
          let otherText = '';
          if (chosenChoice && chosenChoice.includes('他')) {
            const otherTrial = allData.find(d =>
              d.task === 'other_text' &&
              Math.abs((d.time_elapsed || 0) - (trial.time_elapsed || 0)) < 15000
            );
            otherText = otherTrial && otherTrial.other_sound ? otherTrial.other_sound : chosenChoice;
            resultStr = `F(他-${otherText})`;
          } else {
            resultStr = `F(${chosenChoice})`;
          }
        }

        resultRow[`Result_${stim}`] = resultStr;
        resultRow[`RT_${stim}`] = rt;

        if (rt > 0) {
          totalRT += rt;
          countRT++;
        }
      });

      // ===================== เพิ่มสรุป Total Scores =====================
      resultRow['Total Tan-on Score'] = totalTanOn;
      resultRow['Total Yo-on Score'] = totalYoOn;
      resultRow['Average Response Time (ms)'] = countRT > 0 ? Math.round(totalRT / countRT) : 0;

      // ===================== Download CSV =====================
      const headers = Object.keys(resultRow);
      const csvRows = [
        headers.map(h => `"${h}"`).join(','),
        headers.map(h => {
          const value = resultRow[h];
          return `"${value !== null && value !== undefined ? String(value).replace(/"/g, '""') : ''}"`;
        }).join(',')
      ];
      const csvContent = '\uFEFF' + csvRows.join('\n');

      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.setAttribute('href', url);
      link.setAttribute('download', 'ResultPattern.csv');
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      // ===================== แสดงผลในหน้าจอ =====================
      const tanOnCorrect = responseRows.filter(r => tanOnList.includes(r.stimulus) && (r.correct === true || r.correct === 'true')).length;
      const yoOnCorrect = responseRows.filter(r => !tanOnList.includes(r.stimulus) && (r.correct === true || r.correct === 'true')).length;
      
      const displayText = `
════════════════════════════════════════════════════════
                    ผลการทดสอบ / テスト結果
════════════════════════════════════════════════════════

【ข้อมูลพื้นฐาน】
- Email: ${email}
- ปีเรียนญี่ปุ่น: ${studyYear}
- เดือนเรียนญี่ปุ่น: ${studyMonth}
- ปีอาศัยญี่ปุ่น: ${stayYear}
- เดือนอาศัยญี่ปุ่น: ${stayMonth}
- ประสบการณ์การเรียนการออกเสียง: ${pronExperience}
- สถาบัน: ${institution}

【ผลสรุป】
- ตอบถูก Tan-on (単音): ${tanOnCorrect}/11
- ตอบถูก Yo-on (拗音): ${yoOnCorrect}/33
- รวมตอบถูก: ${tanOnCorrect + yoOnCorrect}/44

════════════════════════════════════════════════════════
      ข้อมูลกำลังส่งไปยัง Google Sheets และดาวน์โหลด...
════════════════════════════════════════════════════════
`;
      
      console.log(displayText);

      // ===================== ส่งข้อมูลไปยัง Google Apps Script =====================
      const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzoWL_Z39qNRGM5JCH5Aw2-Zh6PQNSXDvlL_quRq9HvPJ438F_G9_GCQOCqxwgONY5tGw/exec';
      
      // สร้าง detailed rows สำหรับ Google Sheets
      const detailedRows = [];
      stimulusOrder.forEach((stim, index) => {
        const trial = trialMap[stim];
        if (trial) {
          detailedRows.push({
            Email: email,
            stimulus_order: index + 1,
            stimulus: stim,
            correct_response: trial.correct_response,
            response: trial.chosen_choice || 'n/a',
            is_correct: trial.correct === true || trial.correct === 'true' ? 'TRUE' : 'FALSE',
            reaction_time_ms: trial.rt || 'n/a'
          });
        }
      });

      const payload = {
        respondent_data: resultRow,
        detailed_results: detailedRows,
        sheetId: '1kmambkSB2os6UGpYd7PHZqyH8tmkJE4BvSWyjGzQQw0'
      };

      fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(payload)
      })
      .then(response => response.json())
      .then(result => {
        console.log('Google Sheets response:', result);
        if (result.success) {
          alert('✓ ข้อมูลถูกส่งไปยัง Google Sheets เรียบร้อยแล้ว!\n\nข้อมูล (ResultPattern.csv) ยังได้ดาวน์โหลดไปยังโฟลเดอร์ Downloads ของท่าน\n\n✓ Data sent to Google Sheets successfully!\n\nFile (ResultPattern.csv) also downloaded to your Downloads folder.');
        } else {
          alert('⚠️ เกิดข้อผิดพลาดในการส่งไปยัง Google Sheets: ' + (result.error || 'Unknown error') + '\n\nแต่ CSV ถูกดาวน์โหลดเรียบร้อยแล้ว');
        }
      })
      .catch(error => {
        console.error('Error sending to Google Sheets:', error);
        alert('⚠️ ข้อผิดพลาดในการส่งไปยัง Google Sheets: ' + error.message + '\n\nแต่ CSV ถูกดาวน์โหลดเรียบร้อยแล้ว');
      });
    }
  });

  // ========================================
  // สร้าง timeline array เพื่อเก็บขั้นตอนทั้งหมดของการทดลอง
  // ========================================
  const timeline = [];

  // ========================================
  // ขั้นตอนที่ 2: หน้าแรก - ชื่องานวิจัย และหมายเหตุเกี่ยวกับความเป็นส่วนตัว
  // ========================================
  const titleAndNotice = {
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <div style="text-align: center; padding: 30px 20px;">
        <h1 style="font-size: 18px; line-height: 1.8; margin: 0 0 20px 0;">
          在日タイ語母語話者におけるイ段音（単音／拗音）<br>の口蓋化子音の聴取困難<br>
          <span style="font-size: 16px; font-weight: normal;">— 大規模横断調査による要因分析と教育への示唆 —</span><br>
          <span style="font-size: 14px; font-weight: normal; color: #aaa; margin-top: 10px; display: block;">ปัญหาการแยกแยะเสียงพยัญชนะเพดานแข็ง (เสียงเดี่ยว/เสียงควบ)<br>ของผู้พูดภาษาไทยเป็นภาษาแม่ที่อาศัยในญี่ปุ่น<br>— การวิเคราะห์ปัจจัยผ่านการสำรวจขนาดใหญ่ และการให้ข้อเสนอแนะทางการศึกษา —</span>
        </h1>
        
        <div style="background: #333; color: #fff; padding: 20px; border: 1px solid #666; border-radius: 5px; text-align: center; font-size: 14px; line-height: 1.6; margin-top: 20px;">
          <strong>重要な注記 / หมายเหตุสำคัญ:</strong><br>
          本調査は研究目的でのデータ収集のみを目的としています。ご提供いただいたデータは機密として保管され、個人を特定できる情報を含まない概要形式で提示されます。<br>
          研究への参加は自由意思で決定でき、途中で中断・撤回できること、中断・撤回してもなんら不利益を被りません。<br>
          ご提供いただいたデータは本研究に使用され、学会で発表されます。<br>
          <br>
          การสำรวจครั้งนี้มีวัตถุประสงค์เพื่อเก็บรวบรวมข้อมูลสำหรับการศึกษาวิจัยเท่านั้น ข้อมูลที่ท่านให้จะถูกเก็บไว้เป็นความลับ และนำเสนอในรูปแบบภาพรวมโดยไม่มีการระบุข้อมูลที่สามารถระบุตัวตนของท่านได้<br>
          การเข้าร่วมการศึกษานี้เป็นไปตามความสมัครใจของคุณ คุณสามารถหยุดหรือถอนตัวได้ตลอดเวลา และการหยุดหรือถอนตัวจะไม่ก่อให้เกิดผลเสียใด ๆ<br>
          ข้อมูลของท่านจะถูกใช้ในงานวิจัยนี้ และจะถูกนำเสนอในที่ประชุมทางวิชาการ<br>
          <br>
          <strong>ご質問やお問い合わせ / ติดต่อผู้วิจัย:</strong><br>
          (+81)070-9192-6459 / u548378a@ecs.osaka-u.ac.jp<br>
          ケハナン アカラポン (Akarapong Kehanan)<br>
          大阪大学大学院 人文学研究科 博士後期課程
        </div>
      </div>
    `,
    choices: ['同意する / ยินยอม', '同意しません / ไม่ยินยอม'],
    button_html: '<button class="jspsych-btn" style="min-width: 150px; margin: 12px;">%choice%</button>',
    data: { task: 'title_and_notice' },
    on_finish: function(data) {
      data.consent = data.response === 0; // 0 = ยินยอม, 1 = ไม่ยินยอม
    }
  };

  // ========================================
  // หน้าแสดงเมื่อผู้เข้าร่วมไม่ยินยอม
  // ========================================
  const consentRefusal = {
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <div style="text-align: center; padding: 30px 20px;">
        <h1 style="font-size: 24px; margin: 0 0 20px 0; color: #ff6b6b;">
          申し訳ございません / ขออภัย
        </h1>
        <div style="background: #333; color: #fff; padding: 20px; border: 1px solid #ff6b6b; border-radius: 5px; text-align: center; font-size: 14px; line-height: 1.8; margin-top: 20px;">
          <p style="margin: 10px 0;">
            <strong>同意していただけなかったため、本調査は終了いたします。</strong><br>
            ご協力いただき、ありがとうございました。
          </p>
          <p style="margin: 10px 0;">
            <strong>ท่านไม่ยินยอมในการเข้าร่วมการวิจัย จึงขอสิ้นสุดการสำรวจนี้</strong><br>
            ขอบคุณสำหรับความเสียสละเวลาของท่าน
          </p>
        </div>
      </div>
    `,
    choices: ['ตกลง / 了解'],
    button_html: '<button class="jspsych-btn" style="min-width: 150px; padding: 10px 20px; font-size: 16px;">%choice%</button>'
  };

  // ========================================
  // ขั้นตอนที่ 3: แบบสอบถามเกี่ยวกับประสบการณ์การเรียนการออกเสียง
  // ========================================
  const preSurveyChoice = {
    type: jsPsychSurveyMultiChoice,
    questions: [
      {
        prompt: '発音学習経験はありますか？\n<div style="margin-top:6px;color:#ccc;font-size:0.9em">คุณเคยเรียนการออกเสียงแบบเป็นระบบหรือไม่ (มี/ไม่มี)</div>',
        name: 'pron_experience',
        options: ['無', '有'],
        required: true
      }
    ],
    data: { task: 'pre_survey_choice' }
  };

  // ========================================
  // ขั้นตอนที่ 4: แบบสอบถามส่วนที่ 1
  // ========================================
  const preSurveyForm = {
    type: jsPsychHtmlButtonResponse,
    stimulus: function() {
      let yearOptions = '<option value="">กรุณาเลือก / 選択してください</option>';
      for (let i = 0; i <= 50; i++) { yearOptions += `<option value="${i}">${i} 年/ปี</option>`; }
      let monthOptions = '<option value="">กรุณาเลือก / 選択してください</option>';
      for (let m = 0; m <= 12; m++) { monthOptions += `<option value="${m}">${m} ヶ月/เดือน</option>`; }
      monthOptions += '<option value="3">ไม่แน่ใจ (ประมาณ0-6เดือน) / 不確定(約0-6か月)</option>';
      monthOptions += '<option value="9">ไม่แน่ใจ (ประมาณ6-12เดือน) / 不確定(約6-12か月)</option>';

      return `
        <div style="color:#fff">
          <label><strong>学習期間（累積）はどのくらいですか？</strong></label>
          <div style="margin-top:6px;color:#ccc;font-size:0.9em">ระยะเวลาการเรียนภาษาญี่ปุ่นรวม (ปี/เดือน)</div>
          <div style="margin:8px 0">
            <select id="study_year">${yearOptions}</select>
            <select id="study_month">${monthOptions}</select>
          </div>

          <label><strong>滞在期間（合計）はどのくらいですか？</strong></label>
          <div style="margin-top:6px;color:#ccc;font-size:0.9em">ระยะเวลาการพำนักที่ประเทศญี่ปุ่นรวม (ปี และ เดือน)</div>
          <div style="margin:8px 0">
            <select id="stay_year">${yearOptions}</select>
            <select id="stay_month">${monthOptions}</select>
          </div>

          <label><strong>今後の連絡のため、メールアドレスをご記入ください。</strong></label>
          <div style="margin-top:6px;color:#ccc;font-size:0.9em">กรุณากรอกอีเมล (@ และ . ถูกใส่ไว้ให้แล้ว)<br>
          必須ではありません。このメールアドレスの個人情報は、研究が完了するまで (3年以内) 安全ななデータベースに保管され、緊急の連絡の場合のみに使用されます。<br>
          ไม่จำเป็นต้องใส่ ข้อมูลส่วนตัวในช่องอีเมลนี้จะถูกเก็บไว้จนกว่างานวิจัยจะเสร็จสมบูรณ์ (ไม่เกิน 3 ปี) ใน database ที่ปลอดภัย และจะใช้สำหรับการติดต่อกลับในกรณีฉุกเฉินเท่านั้น</div>
          <div style="margin:12px auto; display:flex; gap:4px; align-items:center; justify-content:center; flex-wrap:wrap; max-width:500px;">
            <input id="email_user" type="text" placeholder="email" style="width:120px; background:#111; color:#fff; border:1px solid #444; padding:6px; font-size:0.95em;" />
            <span>@</span>
            <input id="email_domain" type="text" placeholder="example" style="width:120px; background:#111; color:#fff; border:1px solid #444; padding:6px; font-size:0.95em;" />
            <span>.</span>
